aid: waste-connections
name: Waste Connections
description: >-
  Waste Connections is the third-largest integrated provider of solid waste
  services in North America, serving approximately nine million residential,
  commercial, and industrial customers across 46 U.S. states and six Canadian
  provinces. The company provides non-hazardous waste collection, transfer,
  disposal, and recycling services, primarily in exclusive and secondary markets.
  Waste Connections is investing in AI-powered dynamic routing and expanding
  customer connectivity features through its online customer portal.
