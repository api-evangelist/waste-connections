    name: Waste Connections Customer Portal
    description: >-
      The Waste Connections MyAccount customer portal provides online access
      to account management, service scheduling, pickup notifications, billing,
      and payment services for residential and commercial customers. Customers
      can view and pay invoices, update account information, and manage
      recycling and garbage pickup schedules.
