description: Waste Connections does not operate a public developer portal
  and does not publish API rate-limit policy. Customer-portal traffic is
  governed by internal application-tier throttling that is not externally
  documented.
sources:
  - https://www.wasteconnections.com/
notes: No public API rate-limit policy. Limits, when applicable, sit inside
  the customer-portal session and are not externally documented.
limits:
  - name: Not Publicly Documented
    scope: none
    metric: varies
    limit: not publicly documented
    notes: No public API surface; customer-portal throttling is internal.
policies:
  - name: Not Publicly Documented
    description: No public throttling, retry, or quota policy is published.
