description: Waste Connections is the third-largest North American solid-waste
  services provider. Customer-facing capabilities are delivered through the
  consumer customer portal; there is no public developer portal or self-
  service API plan. Trimmed scaffold to a single Contact Sales plan because
  no public API price list exists.
sources:
  - https://www.wasteconnections.com/
notes: Consumer-facing operator with no public developer portal. B2B and
  municipal-customer integrations are negotiated under direct service
  contracts.
plans:
  - id: waste-connections-contact-sales
    name: Contact Sales
    type: enterprise
    description: Service-integration agreements with Waste Connections are
      negotiated bilaterally with municipal, commercial, and industrial
      customers; there is no metered self-service API plan.
    entries:
      - label: Service Agreement
        name: service_agreement
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Bilateral Service Agreement
      - name: Customer Portal Access
