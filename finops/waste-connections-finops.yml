specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Waste Connections
providerId: waste-connections
publisherName: Waste Connections, Inc.
serviceCategory: Environmental / Waste Services
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Waste Management
  - Environmental Services
  - FinOps
  - FOCUS
description: FinOps view of Waste Connections at the corporate level. Waste
  Connections does not bill API consumption; what flows on its invoices is
  scheduled service (collection, disposal, recycling) priced under the
  bilateral service contract.
sources:
  - https://www.wasteconnections.com/
notes: No API invoice surface. FOCUS attribution maps onto the bilateral
  service contract, not a metered API line.
billingModel:
  pricingCategory: Service Contract
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Waste Connections Services
  ServiceCategory: Environmental / Waste Services
  ProviderName: Waste Connections
  PublisherName: Waste Connections, Inc.
  InvoiceIssuerName: Waste Connections, Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: service_pickup
    description: Scheduled waste / recycling pickup events delivered under
      the customer service agreement (out-of-scope for software FinOps;
      included to give the FOCUS row a unit of measure).
    unit: pickup
    aggregation: sum
    dimensions:
      - account
      - service_type
principles:
  - name: Visibility
    description: Track service-line usage via the Waste Connections
      customer portal; reconcile against the monthly invoice.
  - name: Allocation
    description: Allocate environmental-service spend to the consuming
      site / property / cost-center based on the service account.
  - name: Optimization
    description: Optimize collection cadence, dumpster sizing, and
      recycling-stream contamination to reduce monthly service charges.
  - name: Accountability
    description: Facilities / property-management owns the service
      contract and per-site allocation.
maintainers:
